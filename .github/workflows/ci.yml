# ============================================================================
# ci.yml — Continuous Integration Pipeline
# ============================================================================
#
# Runs on every push to main/develop and on every pull request to main.
# Three jobs execute in sequence (build depends on lint) or in parallel:
#
#   1. lint-and-typecheck: ESLint + TypeScript strict checks
#   2. build: Full Next.js production build (depends on lint passing)
#   3. security-audit: npm audit for HIGH/CRITICAL CVEs (non-blocking)
#
# Environment variables use dummy values so the build succeeds without
# real credentials. Real values are only in Vercel and .env.local.
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & TypeScript Type Checking ─────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js 20.x with npm dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      # Install dependencies (ci = clean install, respects lockfile)
      - name: Install dependencies
        run: npm ci

      # Run TypeScript compiler in noEmit mode (type checking only)
      - name: TypeScript typecheck
        run: npx tsc --noEmit

      # Run ESLint across the entire project
      - name: ESLint
        run: npm run lint

      # Run unit tests with coverage enforcement
      - name: Tests
        run: npm test -- --ci --coverage

  # ── Job 2: Production Build ────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    # Dummy environment variables so Next.js build succeeds without
    # real credentials. These are placeholder values only.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js 20.x with npm dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run the full Next.js production build
      - name: Build
        run: npm run build

  # ── Job 3: Security Audit ──────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    # Non-blocking: a HIGH/CRITICAL CVE will be flagged but won't
    # block the merge. Set continue-on-error to false to make it a gate.
    continue-on-error: false

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js 20.x with npm dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run npm audit and save JSON report as a build artifact
      - name: npm audit (JSON report)
        run: npm audit --json > audit-report.json || true

      # Upload the audit report as a downloadable build artifact
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30

      # Fail the job if HIGH or CRITICAL vulnerabilities are found
      - name: Check for high/critical vulnerabilities
        run: npm audit --audit-level=high

      # Comment vulnerability count on PRs for visibility
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            } catch {
              return;
            }
            const vulns = report.metadata?.vulnerabilities || {};
            const high = vulns.high || 0;
            const critical = vulns.critical || 0;
            const total = (vulns.low || 0) + (vulns.moderate || 0) + high + critical;

            const emoji = (high + critical) > 0 ? '🔴' : total > 0 ? '🟡' : '🟢';
            const body = [
              `## ${emoji} Security Audit`,
              '',
              `| Severity | Count |`,
              `|----------|-------|`,
              `| Critical | ${critical} |`,
              `| High | ${high} |`,
              `| Moderate | ${vulns.moderate || 0} |`,
              `| Low | ${vulns.low || 0} |`,
              '',
              `*Auto-generated by CI security-audit job.*`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
