# ============================================================================
# dependency-updates.yml — Weekly Dependency Audit
# ============================================================================
#
# Runs every Monday at 9:00 AM UTC on a cron schedule.
# Checks for outdated packages and known vulnerabilities, then creates
# a GitHub Issue if any HIGH/CRITICAL CVEs are found.
#
# This workflow does NOT auto-update dependencies — it only reports.
# ============================================================================

name: Dependency Updates

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  audit:
    name: Audit & Report
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js 20.x with npm dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run npm audit and capture the output
      - name: Run npm audit
        id: audit
        run: |
          echo "## npm audit report" > audit-report.md
          echo '```' >> audit-report.md
          npm audit --omit=dev 2>&1 >> audit-report.md || true
          echo '```' >> audit-report.md
          echo "" >> audit-report.md

      # Check for outdated packages and capture the output
      - name: Check outdated packages
        id: outdated
        run: |
          echo "## Outdated packages" >> audit-report.md
          echo '```' >> audit-report.md
          npm outdated 2>&1 >> audit-report.md || true
          echo '```' >> audit-report.md

      # Create a GitHub Issue if vulnerabilities are found
      - name: Create issue if vulnerabilities found
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit-report.md', 'utf8');

            // Only create an issue if there are actual vulnerabilities
            const hasVulnerabilities = report.includes('high') || report.includes('critical');

            if (hasVulnerabilities) {
              const today = new Date().toISOString().split('T')[0];
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔒 Dependency Security Report — ${today}`,
                body: `# Weekly Dependency Audit\n\n${report}\n\n---\n*Auto-generated by the dependency-updates workflow.*`,
                labels: ['dependencies', 'security']
              });
              console.log('Issue created for vulnerabilities found.');
            } else {
              console.log('No HIGH/CRITICAL vulnerabilities found. No issue created.');
            }
